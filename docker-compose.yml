version: '3.9'

services:

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: gguild
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: gguild_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7

  agents:
    build: .
    command: python agents/orchestrator.py

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"